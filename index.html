<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial;
  overflow-x: hidden;
}

/* TOP BLACK STRIPE ANIMATION */
body::before {
  content: "";
  position: fixed;
  top: -200px;
  left: 0;
  width: 100%;
  height: 200px;
  background: linear-gradient(to bottom, #000, transparent);
  animation: slideDown 2s ease forwards;
  z-index: 2;
}

@keyframes slideDown {
  to {
    top: 0;
  }
}

/* SOFT BACKGROUND GLOW */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 30%, rgba(176,38,255,0.08), transparent),
              radial-gradient(circle at 80% 70%, rgba(255,215,0,0.05), transparent);
  z-index: -1;
}

/* TITLE */
h1 {
  text-align: center;
  color: gold;
  font-size: 70px;
  letter-spacing: 6px;
  margin-top: 80px;
}

/* SUBTITLE */
.subtitle {
  text-align: center;
  color: #b026ff;
  margin-bottom: 40px;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* BOX */
.box {
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  border-radius: 14px;
  padding: 25px;
  margin-bottom: 30px;
  transition: 0.25s;
}

.box:hover {
  border-color: #b026ff;
  box-shadow: 0 0 25px rgba(176,38,255,0.15);
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 12px 30px;
  border: 1px solid gold;
  color: gold;
  text-decoration: none;
  transition: 0.25s;
}

.btn:hover {
  background: #b026ff;
  border-color: #b026ff;
  color: white;
  transform: scale(1.03);
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 14px;
  border-bottom: 1px solid #1a1a1a;
}

th {
  color: #777;
}

td {
  color: #ccc;
}

/* DOWNLOAD BUTTON */
.download-btn {
  padding: 6px 16px;
  border: 1px solid #b026ff;
  color: #b026ff;
  text-decoration: none;
  transition: 0.25s;
}

.download-btn:hover {
  background: #b026ff;
  color: white;
  box-shadow: 0 0 10px #b026ff;
}

/* LICENSE BAR */
.license-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #050505;
  border-top: 1px solid #1a1a1a;
}

.license-header {
  padding: 15px;
  cursor: pointer;
  color: gold;
  text-align: center;
}

.license-content {
  display: none;
  padding: 20px;
  color: #aaa;
  max-height: 300px;
  overflow-y: auto;
}
</style>
