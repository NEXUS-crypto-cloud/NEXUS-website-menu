<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>NYXION Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: monospace; background: #0a0a1a; color: #0ff; padding: 2rem; }
        .admin-box { max-width: 800px; margin: 0 auto; background: #111; padding: 2rem; border-radius: 1rem; border: 1px solid #0ff; }
        input, textarea, select { width: 100%; margin: 0.5rem 0; padding: 0.5rem; background: #222; color: #0ff; border: 1px solid #0ff; }
        button { background: #0ff; color: #000; padding: 0.5rem 1rem; margin: 0.5rem; cursor: pointer; border: none; }
        .product-item { border: 1px solid #0ff; margin: 1rem 0; padding: 1rem; }
        .danger { background: #f00; color: #fff; }
    </style>
</head>
<body>
<div class="admin-box">
    <h1>🔐 NYXION Admin Panel</h1>
    <div id="auth-status"></div>
    <button id="loginBtn">🔑 Bejelentkezés Google-lel</button>
    <div id="admin-content" style="display:none;">
        <hr>
        <h2>📦 Termék hozzáadása</h2>
        <input type="text" id="nameHu" placeholder="Név (HU)" value="Teszt program">
        <input type="text" id="nameEn" placeholder="Name (EN)" value="Test program">
        <input type="text" id="catHu" placeholder="Kategória (HU)" value="Segédprogram">
        <input type="text" id="catEn" placeholder="Category (EN)" value="Utility">
        <input type="text" id="url" placeholder="GitHub URL" value="https://github.com/example/test.exe">
        <input type="text" id="fileType" placeholder="File típus" value=".exe">
        <input type="text" id="os" placeholder="OS" value="Win10/11">
        <input type="text" id="pass" placeholder="Jelszó" value="nyxion">
        <select id="locked">
            <option value="false">🔓 Nyitott</option>
            <option value="true">🔒 Zárolt</option>
        </select>
        <textarea id="reqHu" placeholder="Követelmény (HU)"></textarea>
        <textarea id="reqEn" placeholder="Requirements (EN)"></textarea>
        <textarea id="infoHu" placeholder="Info (HU)"></textarea>
        <textarea id="infoEn" placeholder="Info (EN)"></textarea>
        <button id="addBtn">➕ Hozzáadás</button>
        
        <hr>
        <h2>📋 Termékek listája</h2>
        <div id="product-list"></div>
    </div>
</div>

<script>
// 🔥 SAJÁT FIREBASE CONFIG - EZT ÍRD ÁT!
const firebaseConfig = {
    apiKey: "AIzaSyANzkn08nF3-_Dsg19wscz67dYRPk8pMgY",
    authDomain: "nexus-08.firebaseapp.com",
    projectId: "nexus-08",
    storageBucket: "nexus-08.firebasestorage.app",
    messagingSenderId: "1066992373942",
    appId: "1:1066992373942:web:cbc354f288a5c351e25617"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const ADMIN_EMAIL = "szupgabriel67@gmail.com"; // 👈 Ide írd be az admin email címed!

let products = [];

function checkAdmin(user) {
    if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('auth-status').innerHTML = `<p>✅ Bejelentkezve mint: ${user.email} (Admin)</p>`;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadProducts();
        return true;
    } else if (user) {
        document.getElementById('auth-status').innerHTML = `<p>❌ Nincs admin jogosultságod! (${user.email})</p>`;
        document.getElementById('loginBtn').style.display = 'inline-block';
        document.getElementById('admin-content').style.display = 'none';
        return false;
    }
    return false;
}

async function loadProducts() {
    const snapshot = await db.collection('products').get();
    products = [];
    snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
    renderProductList();
}

function renderProductList() {
    const container = document.getElementById('product-list');
    if (products.length === 0) {
        container.innerHTML = '<p>Még nincs termék.</p>';
        return;
    }
    container.innerHTML = products.map(p => `
        <div class="product-item">
            <strong>${p.name?.hu || '?'}</strong> / ${p.name?.en || '?'}
            <br>Kategória: ${p.category?.hu || '?'} / ${p.category?.en || '?'}
            <br><a href="${p.githubUrl}" target="_blank">${p.githubUrl}</a>
            <br>Zárolt: ${p.locked ? '🔒 IGEN' : '🔓 NEM'}
            <br>
            <button onclick="deleteProduct('${p.id}')" class="danger">🗑️ Törlés</button>
            <button onclick="toggleLock('${p.id}', ${!p.locked})">${p.locked ? '🔓 Feloldás' : '🔒 Zárolás'}</button>
        </div>
    `).join('');
}

window.deleteProduct = async (id) => {
    if (confirm('Biztosan törlöd?')) {
        await db.collection('products').doc(id).delete();
        loadProducts();
        alert('Törölve!');
    }
};

window.toggleLock = async (id, newLockState) => {
    await db.collection('products').doc(id).update({ locked: newLockState });
    loadProducts();
    alert('Frissítve!');
};

document.getElementById('addBtn').addEventListener('click', async () => {
    const newProduct = {
        name: {
            hu: document.getElementById('nameHu').value,
            en: document.getElementById('nameEn').value
        },
        category: {
            hu: document.getElementById('catHu').value,
            en: document.getElementById('catEn').value
        },
        githubUrl: document.getElementById('url').value,
        fileType: document.getElementById('fileType').value,
        os: document.getElementById('os').value,
        pass: document.getElementById('pass').value,
        locked: document.getElementById('locked').value === 'true',
        deleted: false,
        requirements: {
            hu: document.getElementById('reqHu').value,
            en: document.getElementById('reqEn').value
        },
        infoText: {
            hu: document.getElementById('infoHu').value,
            en: document.getElementById('infoEn').value
        }
    };
    
    if (!newProduct.name.hu || !newProduct.name.en) {
        alert('A név megadása kötelező!');
        return;
    }
    
    await db.collection('products').add(newProduct);
    alert('Termék hozzáadva!');
    loadProducts();
    
    // Mezők kiürítése
    document.getElementById('nameHu').value = '';
    document.getElementById('nameEn').value = '';
    document.getElementById('reqHu').value = '';
    document.getElementById('reqEn').value = '';
    document.getElementById('infoHu').value = '';
    document.getElementById('infoEn').value = '';
});

document.getElementById('loginBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider);
});

auth.onAuthStateChanged((user) => {
    checkAdmin(user);
});
</script>
</body>
</html>
